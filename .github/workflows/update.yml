name: Update SciGym Registry

on:
  schedule:
    - cron: '17 6 * * *'   # daily 06:17 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run update script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 update.py

      - name: Commit if changed
        run: |
          git config user.name "scigym-bot"
          git config user.email "bot@scigym-registry"
          git add README.md
          git diff --staged --quiet || git commit -m "chore: auto-update registry [skip ci]"
          git push
